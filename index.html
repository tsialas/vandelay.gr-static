.frameset {
  display: grid;
  grid-template-columns: 180px 1fr;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "banner banner"
    "nav    main"
    "bot    bot";
  min-height: 100vh;
  gap: 4px;
  padding: 4px;
  box-sizing: border-box;
}
.frame {
  border: 3px ridge #c0c0c0;
  background: #000080;
  padding: 8px;
  overflow: auto;
  box-sizing: border-box;
}
.frame-banner { grid-area: banner; text-align: center; padding: 6px; }
.frame-nav    { grid-area: nav; }
.frame-main   { grid-area: main; padding: 0; background: #ffffcc; display: flex; align-items: center; justify-content: center; }
.frame-bot    { grid-area: bot; padding: 8px; }
@media (max-width: 700px) {
  .frameset {
    grid-template-columns: 1fr;
    grid-template-areas:
      "banner"
      "nav"
      "main"
      "bot";
  }
  .frame-main { min-height: 60vh; }
}
.rainbow {
  background: linear-gradient(90deg,
    #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0080ff, #8000ff, #ff00ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: bold;
  font-size: 2.4em;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  font-family: "Impact", "Comic Sans MS", sans-serif;
  letter-spacing: 1px;
}
.bot-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-around;
  gap: 16px;
}
.bot-cell {
  text-align: center;
  color: #ffff00;
  font-family: "Comic Sans MS", cursive;
  font-size: 0.85em;
}
.bot-cell img { vertical-align: middle; }
#hitcounter {
  background: #000;
  color: #0f0;
  font-family: "Courier New", monospace;
  border: 2px inset #888;
  padding: 2px 6px;
  font-weight: bold;
  letter-spacing: 2px;
}
#musicbtn {
  background: #c0c0c0;
  border: 2px outset #fff;
  font-family: "Comic Sans MS", cursive;
  cursor: pointer;
  padding: 4px 10px;
  color: #000;
}
#musicbtn:active { border-style: inset; }

<script>
(function(){
  if (matchMedia('(hover: none)').matches) return;
  var last = 0;
  document.addEventListener('mousemove', function(e){
    var now = Date.now();
    if (now - last < 60) return;
    last = now;
    var s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = (e.clientX - 8) + 'px';
    s.style.top  = (e.clientY - 8) + 'px';
    document.body.appendChild(s);
    setTimeout(function(){ s.remove(); }, 700);
  });
})();
(function(){
  var n = parseInt(localStorage.getItem('vandelay_hits') || '1336745', 10) + 1;
  localStorage.setItem('vandelay_hits', n);
  document.getElementById('hitcounter').textContent = String(n).padStart(7, '0');
})();
(function(){
  var btn = document.getElementById('musicbtn');
  if (!btn) return;
  btn.addEventListener('click', function(){
    alert('Your browser cannot play MIDI files natively. Imagine a tinny rendition of "Greensleeves".');
  });
})();
</script>
